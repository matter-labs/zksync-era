name: Lint

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:

  linter:
    runs-on: matterlabs-ci-runner-highmem-long
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

#      - name: Setup environment
#        run: |
#          echo ZKSYNC_HOME=$(pwd) >> $GITHUB_ENV
#          echo $(pwd)/bin >> $GITHUB_PATH
#          echo IN_DOCKER=1 >> .env
#          echo "SCCACHE_GCS_BUCKET=matterlabs-infra-sccache-storage" >> .env
#          echo "SCCACHE_GCS_SERVICE_ACCOUNT=gha-ci-runners@matterlabs-infra.iam.gserviceaccount.com" >> .env
#          echo "SCCACHE_GCS_RW_MODE=READ_WRITE" >> .env
#          echo "RUSTC_WRAPPER=sccache" >> .env
#          echo "ZKSYNC_USE_CUDA_STUBS=true" >> .env
#          echo "PROVER_URL=postgres://postgres:notsecurepassword@localhost:5432/zksync_local_prover" >> $GITHUB_ENV
#          echo "CORE_URL=postgres://postgres:notsecurepassword@localhost:5432/zksync_local" >> $GITHUB_ENV

#      - name: Start services
#        run: |
#          ci_localnet_up

#      - name: Install zkstack
#        run: |
#          ./zkstack_cli/zkstackup/install -g --path ./zkstack_cli/zkstackup/zkstackup
#          zkstackup -g --local

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@v1

      - name: Build
        run: yarn install

      - name: Check formating
        shell: 'bash -ex {0}'
        run: zkstack dev fmt --check

      - name: Lint
        shell: 'bash -ex {0}'
        run: zkstack dev lint --check

      - name: Check Database
        env:
          PROVER_URL: 'postgres://postgres:notsecurepassword@localhost:5432/zksync_local_prover'
          CORE_URL: 'postgres://postgres:notsecurepassword@localhost:5432/zksync_local'
        run: |
          ./bin/ci_localnet_up
          zkstack dev db setup --prover-url=${{ env.PROVER_URL }} --core-url=${{ env.CORE_URL }}
          zkstack dev database check-sqlx-data --prover-url=${{ env.PROVER_URL }} --core-url=${{ env.CORE_URL }}
