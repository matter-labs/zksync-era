  lint-native:
    runs-on: matterlabs-ci-runner-highmem-long
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Apt install
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2024-08-01
          components: rustfmt,clippy
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core -> target
            prover -> target
            zkstack_cli -> target

      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Yarn install
        run: |
          npm install -g yarn
          yarn install

      - name: Install zkstack
        env:
          ZKSTACK_DOWNLOAD_URL: 'https://github.com/matter-labs/zksync-era/releases/download/ad0df3a'
          ZKSTACK_FILENAME: 'zkstack-test-x86_64-unknown-linux-gnu.tar.gz'
        run: |
          curl -L ${ZKSTACK_DOWNLOAD_URL}/${ZKSTACK_FILENAME} --output ${ZKSTACK_FILENAME}
          tar -xzf ${ZKSTACK_FILENAME}
          mv zkstack ${PWD}/bin
          echo ${PWD}/bin >> ${GITHUB_PATH}

      - name: Install forge
        env:
          FORGE_DOWNLOAD_URL: 'https://github.com/matter-labs/foundry-zksync/releases/download/foundry-zksync-v0.0.8'
          FORGE_FILENAME: 'foundry_zksync_v0.0.8_linux_amd64.tar.gz'
        run: |
          curl -L ${FORGE_DOWNLOAD_URL}/${FORGE_FILENAME} --output ${FORGE_FILENAME}
          tar -xzf ${FORGE_FILENAME}
          mv forge ${PWD}/bin
          echo ${PWD}/bin >> ${GITHUB_PATH}

      - name: Build contracts
        working-directory: contracts
        run: yarn install

      - name: Format
        run: zkstack dev fmt --check

      - name: Lint
        run: zkstack dev lint --check
