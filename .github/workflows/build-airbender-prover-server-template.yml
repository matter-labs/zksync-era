name: Build Airbender Prover Server images
on:
  workflow_call:
    secrets:
      DOCKERHUB_USER:
        description: "DOCKERHUB_USER"
        required: true
      DOCKERHUB_TOKEN:
        description: "DOCKERHUB_TOKEN"
        required: true
    inputs:
      image_tag_suffix:
        description: "Optional suffix to override tag name generation"
        type: string
        required: false
      action:
        description: "Action with docker image (build | push)"
        type: string
        default: "push"
        required: false

# The Airbender prover server is a self-contained Cargo workspace that pulls
# `eravm-prover-host` and the guest verifier crates as git dependencies, so its
# Docker build context is the workspace directory (NOT the repo root) and it uses
# its own CUDA base image rather than `matterlabs/zksync-build-base`. That is why
# it has a dedicated template instead of riding on `build-prover-template.yml`.
jobs:
  build-images:
    name: Build and Push Docker Images
    runs-on: [matterlabs-ci-runner-high-performance]
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # GPU image: FRI prover (CUDA) + SNARK wrapper. Published under the
          # verifier repo's canonical image name, matching what eravm-airbender-verifier
          # itself pushed (`us-docker.pkg.dev/.../eravm-airbender-verifier`).
          - image: eravm-airbender-verifier
            dockerfile: docker/airbender-prover-server/Dockerfile
          # CPU image: snark-only pipeline, no CUDA — same name with a `-cpu` suffix.
          - image: eravm-airbender-verifier-cpu
            dockerfile: docker/airbender-prover-server/Dockerfile.cpu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: "recursive"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set env vars
        shell: bash
        run: |
          # Support for custom tag suffix; fall back to a short-sha + timestamp.
          if [ -n "${{ inputs.image_tag_suffix }}" ]; then
            echo IMAGE_TAG_SUFFIX="${{ inputs.image_tag_suffix }}" >> $GITHUB_ENV
          else
            echo IMAGE_TAG_SUFFIX="$(git rev-parse --short HEAD)-$(date +%s)" >> $GITHUB_ENV
          fi

      - name: login to Docker registries
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        shell: bash
        run: |
          docker login -u ${{ secrets.DOCKERHUB_USER }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          gcloud auth configure-docker us-docker.pkg.dev -q

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          # Self-contained workspace dir — see the comment above the jobs block.
          context: airbender_prover_server
          file: ${{ matrix.dockerfile }}
          load: true
          tags: |
            us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/${{ matrix.image }}:${{ env.IMAGE_TAG_SUFFIX }}
            matterlabs/${{ matrix.image }}:${{ env.IMAGE_TAG_SUFFIX }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ env.IMAGE_TAG_SUFFIX }}
            us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/${{ matrix.image }}:latest
            matterlabs/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

      - name: Push docker image
        if: ${{ inputs.action == 'push' }}
        run: |
          docker push us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/${{ matrix.image }}:${{ env.IMAGE_TAG_SUFFIX }}
          docker push matterlabs/${{ matrix.image }}:${{ env.IMAGE_TAG_SUFFIX }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ env.IMAGE_TAG_SUFFIX }}
          docker push us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/${{ matrix.image }}:latest
          docker push matterlabs/${{ matrix.image }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
