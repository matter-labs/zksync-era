[package]
name = "zksync_cli_utils"
description = "Shared command-line helpers for repository-owned batch input workflows"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
anyhow.workspace = true
bincode = { version = "2", features = ["serde"] }
flate2.workspace = true
sentry = { workspace = true, optional = true }
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
zksync_airbender_verifier.workspace = true

[features]
# Adds the Sentry tracing layer to `init_tracing`. Enabled by the server binary;
# left off for host and the verifier libraries so they don't link Sentry.
sentry = ["dep:sentry"]
